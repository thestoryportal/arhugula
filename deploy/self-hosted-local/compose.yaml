name: arhugula-r420-self-hosted-local

services:
  tempo:
    image: ${R420_TEMPO_IMAGE:-grafana/tempo:2.10.0}
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    expose:
      - "4317"
      - "4318"

  otel-collector:
    image: ${R420_OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.153.0}
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_started

  grafana:
    image: ${R420_GRAFANA_IMAGE:-grafana/grafana:12.2.0}
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_started

volumes:
  grafana-data:
  tempo-data:
