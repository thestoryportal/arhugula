# R-420 SELF_HOSTED_SERVER runtime template.
#
# Copy to `harness.selfhosted.local.toml` at the workspace root and replace
# `/absolute/path/to/arhugula-v2` with the actual root path. Do not commit the
# copied local file if it contains machine-specific paths.

[runtime]
deployment_surface = "self-hosted-server"
repository_root = "/absolute/path/to/arhugula-v2"
default_topology = "single-threaded-linear"

# Keep hosted providers optional for the no-paid local live e2e. The live
# workflow binds to local Ollama and does not invoke hosted-provider inference.
anthropic_optional = true
openai_optional = true
ollama_optional = false
ollama_host = "http://127.0.0.1:11434"

[runtime.provider_secrets]
backend = "self-hosted-keyring"
keyring_service = "harness"

[[runtime.provider_secrets.operator_allowlist]]
name = "r420_probe_key"
scope = { name = "r420-live" }

[runtime.otel]
# Runtime currently uses the OTLP gRPC exporter; the local collector exposes
# gRPC on 4317 and HTTP on 4318.
otlp_endpoint = "http://127.0.0.1:4317"

[runtime.collector]
placement = "SELF_HOSTED_BACKEND_COLLECTOR"

[[runtime.path_bindings.raw_entries]]
path_class = "SKILLS"
workflow_class = "pipeline-automation"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/.agents/skills"

[[runtime.path_bindings.raw_entries]]
path_class = "PROMPTS"
workflow_class = "pipeline-automation"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/prompts"

[[runtime.path_bindings.raw_entries]]
path_class = "ROUTING_MANIFEST"
workflow_class = "pipeline-automation"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/routing_manifest"

[[runtime.path_bindings.raw_entries]]
path_class = "STATE_LEDGER"
workflow_class = "pipeline-automation"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/.harness/state.jsonl"

[[runtime.path_bindings.raw_entries]]
path_class = "SKILLS"
workflow_class = "software-engineering"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/.agents/skills"

[[runtime.path_bindings.raw_entries]]
path_class = "PROMPTS"
workflow_class = "software-engineering"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/prompts"

[[runtime.path_bindings.raw_entries]]
path_class = "ROUTING_MANIFEST"
workflow_class = "software-engineering"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/routing_manifest"

[[runtime.path_bindings.raw_entries]]
path_class = "STATE_LEDGER"
workflow_class = "software-engineering"
deployment_surface = "self-hosted-server"
path = "/absolute/path/to/arhugula-v2/.harness/state.jsonl"

[[runtime.mcp_clients]]
client_name = "r420-echo"
transport = "stdio"
trust_level = "L1_SIGNED_PINNED"
blast_radius = "READ_ONLY"
connection_url = "stdio://uv run python /absolute/path/to/arhugula-v2/deploy/self-hosted-local/mcp_echo_server.py"
default_minimum_tier = "tier-1-process"
default_blast_radius = "READ_ONLY"
default_sandbox_tier = "tier-1-process"
default_sandbox_tech = "host-process"
default_sandbox_provider = "host"

[runtime.routing_manifest]
manifest_version = 1
per_role_bindings = {}
per_workload_overrides = {}
retry_policies = {}
fallback_chains = [
  { primary = { provider = "ollama", model = "llama3.2:3b", family = "local_open_weight" }, same_family = [], cross_family = [] },
]
