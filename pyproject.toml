# pyproject.toml — uv workspace root for the H_T multi-LLM agent harness build.
#
# Authority:
#   - CLAUDE.md §3.1 "Committed stack"  + §3.2 "Framework-pull discipline" + §3.3 "Repo layout"
#   - Target_Stack_Commitment_v1.md §5.1 + §5.2 (Python 3.12+ / Pydantic v2 / uv / pyright / ruff / pytest)
#   - Plan_Executability_Audit_v1.md (framework-pull discipline)
#
# This is the WORKSPACE ROOT. `package = false` (see [tool.uv]) keeps the root
# non-distributable — it carries shared config + the shared dev environment, but
# the 6 axis packages enumerated in [tool.uv.workspace].members are the build units.

[project]
name = "harness-workspace"
version = "0.0.0"
description = "H_T — multi-LLM agent harness target build (Phase 7 workspace root)"
requires-python = ">=3.12"

# Shared runtime libraries — installed into the single workspace .venv "for shared use"
# per Bootstrap Runbook §4.4.1. The owning axis packages re-declare the ones they use
# as [project.dependencies] in their own pyproject.toml per Runbook §4.4.2 (uv dedupes).
dependencies = [
    "pydantic>=2.10",          # Type contracts — Pydantic v2 (Target Stack §5.1 / C-STK-08)
    "anthropic>=0.45",         # Multi-LLM SDK — Anthropic    (per-provider SDKs, ADR-F1 v1.2; NOT LiteLLM)
    "openai>=1.60",            # Multi-LLM SDK — OpenAI
    "ollama>=0.4",             # Multi-LLM SDK — local tier
    "mcp>=1.2",                # MCP host + client — official modelcontextprotocol/python-sdk (FastMCP)
    "keyring>=25.5",           # Secrets — python-keyring OS-keyring abstraction (ADR-F5 v1.1)
    "google-cloud-secret-manager>=2.0",  # Secrets — GCP Secret Manager backend for MANAGED_CLOUD
]

[dependency-groups]
# Development tooling + observability libs — Runbook §4.4.1 "Root dev dependencies (dev group)".
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
    "pytest-cov>=6.0",         # Coverage measurement — R-200-ci-coverage-gating (informational at v1; general-purpose tooling, not a framework-pull-discipline target)
    "pyright>=1.1.390",
    "ruff>=0.9",
    "pyyaml>=6.0",
    "opentelemetry-api>=1.30",
    "opentelemetry-sdk>=1.30",
    "opentelemetry-exporter-otlp>=1.30",
    # "opentelemetry-instrumentation-genai>=0.50b0",   # [SPECULATIVE] no single PyPI package by this
    #   name; OTel GenAI contrib instrumentation is split (opentelemetry-instrumentation-openai-v2,
    #   opentelemetry-instrumentation-google-genai, ...). Substitute the actual split package(s) at
    #   the AS/OD-axis units that require GenAI instrumentation. Logged as Class 3 informational.
    "instructor>=1.15.4",
]

[tool.uv]
package = false                # Root is not itself a buildable package.
default-groups = ["dev"]        # `uv sync` installs the dev group by default.

# Coverage config — R-200-ci-coverage-gating (informational at v1; NO threshold —
# "gather data first" per Project_Roadmap_v1.md §5 R-200-ci-coverage-gating).
# `source` lists the 7 workspace import packages so `pytest --cov` (no arg)
# measures production code; test packages are omitted. The CI `coverage` job
# (advisory) runs the non-e2e suite under coverage and publishes a summary +
# coverage.xml artifact. No `fail_under` — a threshold lands only once a baseline
# trend justifies it (tracked as a future tightening, mirroring lint/typecheck).
[tool.coverage.run]
branch = true
source = [
    "harness_core",
    "harness_is",
    "harness_as",
    "harness_cp",
    "harness_od",
    "harness_cxa",
    "harness_runtime",
]
omit = ["*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.uv.workspace]
members = [
    "harness-core",
    "harness-is",
    "harness-as",
    "harness-cp",
    "harness-od",
    "harness-cxa",
    "harness-runtime",
]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.12"
include = [
    "harness-core/src",    "harness-core/tests",
    "harness-is/src",      "harness-is/tests",
    "harness-as/src",      "harness-as/tests",
    "harness-cp/src",      "harness-cp/tests",
    "harness-od/src",      "harness-od/tests",
    "harness-cxa/src",     "harness-cxa/tests",
    "harness-runtime/src", "harness-runtime/tests",
]
exclude = ["**/__pycache__", ".venv", ".harness"]

# Test modules are scoped-relaxed under R-200-ci-lint-typecheck-blocking, the
# pyright analog to the lint half's `**/tests/**` per-file-ignores (PR #159).
# Test code legitimately passes partial mocks/fixtures to typed constructors,
# uses untyped lambdas, and reaches into private members — strict-mode noise that
# the 3543 green tests already gate functionally. src/ is held to full strict.
# One entry per harness-*/tests dir (pyright executionEnvironments.root is a
# directory path, not a glob); kept uniform across all 7 so a new test in a
# currently-clean dir does not newly-block once typecheck is blocking.
[[tool.pyright.executionEnvironments]]
root = "harness-core/tests"
reportArgumentType = "none"
reportAttributeAccessIssue = "none"
reportCallIssue = "none"
reportMissingImports = "none"
reportMissingParameterType = "none"
reportMissingTypeArgument = "none"
reportOperatorIssue = "none"
reportOptionalMemberAccess = "none"
reportOptionalSubscript = "none"
reportPossiblyUnboundVariable = "none"
reportPrivateImportUsage = "none"
reportPrivateUsage = "none"
reportTypedDictNotRequiredAccess = "none"
reportUnknownArgumentType = "none"
reportUnknownLambdaType = "none"
reportUnknownMemberType = "none"
reportUnknownParameterType = "none"
reportUnknownVariableType = "none"
reportUnnecessaryCast = "none"
reportUnusedExpression = "none"
reportUnusedFunction = "none"
reportUnusedImport = "none"
reportUnusedVariable = "none"

