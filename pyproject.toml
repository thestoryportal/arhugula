[tool.ruff]
line-length = 100
target-version = "py312"
# `_bmad` + the installed `bmad-*` skill scripts are vendored third-party tooling
# (BMAD-METHOD, MIT, kept verbatim for clean upstream re-pulls); excluded from our
# lint/format profile like `.harness` and `design-substrate`.
extend-exclude = [".harness", ".venv", "design-substrate", "_bmad", ".claude/skills/bmad-*", ".agents/skills/bmad-*"]
# Honor the excludes even when a tool passes explicit file paths (the Stop-gate /
# pre-commit / CI lint hooks enumerate changed files), so vendored `bmad-*` skill
# scripts are skipped however ruff is invoked.
force-exclude = true

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "ASYNC", "RUF"]
# Design-substrate notation uses Unicode `×` (multiplication sign) and `–` (en dash)
# intentionally in docstrings, string literals, and comments (e.g., "persona × engine"
# matrices, "5–7 attempts" ranges). Ruff's RUF001/002/003 flag these as ambiguous
# against ASCII lookalikes; in this codebase they are domain notation, not typos.
#
# ASYNC109: the harness deliberately exposes `timeout` parameters on its HITL
# surfaces (the canonical §17.4 HITL gate signature per CP spec C-CP-17 §17.4 +
# the AskUserQuestion surfaces) and its dispatch surfaces (step_dispatch_timeout_seconds
# per runtime spec C-RT-03). The timeout-as-parameter pattern is intentional,
# spec-mandated API design — not the accidental-blocking shape ASYNC109 targets;
# rewriting to `asyncio.timeout()` context managers would break the spec signatures.
ignore = ["RUF001", "RUF002", "RUF003", "ASYNC109"]

[tool.ruff.lint.per-file-ignores]
# Two src modules carry hand-aligned markdown tables inside docstrings (the
# classification-trigger table + the audit-payload path-disjointness table) where
# wrapping would destroy the column alignment — same rationale as the CP test
# docstring tables historically carved out below.
"harness-od/src/harness_od/tail_keep_classification.py" = ["E501"]
"harness-od/src/harness_od/pause_resume_namespace.py" = ["E501"]

# Test files carry idioms that are legitimate in test context but flagged by the
# production-grade lint profile. Scoped to tests/ only (never src/), and excludes
# all F-codes so real undefined-name / unused-import bugs still surface:
#   E402  — imports after monkeypatch / sys.modules setup or sys.path fixup
#   E501  — AC-coverage docstring tables + long inline JSON / manifest fixtures
#   B017  — pytest.raises(Exception) as a deliberate "any-error" assertion
#   B007  — intentionally-unused loop variables in enumeration assertions
#   B018  — bare attribute/expression access exercised for its raise/no-raise
#   N801/N806/N814/N817/N818 — test-fixture class/var naming + imported-constant
#            aliases + Fail/Signal exception names mirroring production identifiers
#   RUF006 — fire-and-forget trigger tasks whose lifetime is the test's own await
#   RUF012/RUF015/RUF022/RUF043/RUF059 — test-fixture mutable attrs + minor style
#   ASYNC110/ASYNC240 — faithful mocks of polling servers + module-source
#            introspection reads (blocking is correct in the test double)
"**/tests/**/*.py" = [
    "E402",
    "E501",
    "B017",
    "B007",
    "B018",
    "N801",
    "N806",
    "N814",
    "N817",
    "N818",
    "RUF006",
    "RUF012",
    "RUF015",
    "RUF022",
    "RUF043",
    "RUF059",
    "ASYNC110",
    "ASYNC240",
]

[tool.ruff.format]
docstring-code-format = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
# `importlib` mode prevents the `ModuleNotFoundError: No module named 'tests.X'`
# collision that arises when multiple workspace members each carry a `tests/`
# package with `__init__.py`. Standard fix per the pytest-importmode docs.
addopts = "--import-mode=importlib"
markers = [
    "e2e: end-to-end tests exercising real external services (e.g., Anthropic API); typically gated on credential env vars (ANTHROPIC_API_KEY etc.) and excluded from default CI runs",
]
testpaths = [
    "harness-core/tests",
    "harness-is/tests",
    "harness-as/tests",
    "harness-cp/tests",
    "harness-od/tests",
    "harness-cxa/tests",
    "harness-runtime/tests",
]
